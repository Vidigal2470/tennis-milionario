<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tênis Predictor v3.15</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0d1f12;color:#e8f5e9;min-height:100vh;padding:10px}
.header{text-align:center;margin-bottom:12px}
.header h1{font-size:15px;font-weight:700;color:#a5d6a7;letter-spacing:1px;text-transform:uppercase}
.header p{font-size:10px;color:#66bb6a;margin-top:2px}
.progress-wrap{margin-bottom:10px}
.progress-label{text-align:center;font-size:10px;color:#66bb6a;margin-bottom:6px}
.progress{display:flex;gap:4px;justify-content:center;flex-wrap:wrap}
.game-slot{display:flex;gap:2px;align-items:center}
.chip{width:28px;height:28px;border-radius:6px;border:1px solid #2e5030;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;background:#122115}
.chip.active{border:2px solid #66bb6a;box-shadow:0 0 0 2px rgba(102,187,106,.2)}
.chip.empty{color:#2e5030;font-size:9px}
.chip.A{background:#1a2a1a;color:#81c784;border-color:#81c784}
.chip.B{background:#1a2535;color:#64b5f6;border-color:#64b5f6}
.chip.C{background:#2a1a1a;color:#ef9a9a;border-color:#ef9a9a}
.chip.D{background:#1a2a1a;color:#a5d6a7;border-color:#a5d6a7}
.sep{font-size:8px;color:#2e5030}
.step-label{text-align:center;font-size:12px;font-weight:600;color:#a5d6a7;margin-bottom:8px;min-height:18px}
.pad{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:260px;margin:0 auto 10px}
.btn{height:60px;border-radius:10px;border:1px solid #2e5030;font-size:24px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1px;user-select:none;-webkit-tap-highlight-color:transparent;transition:transform .1s}
.btn span.sub{font-size:9px;font-weight:400;opacity:.7}
.btn-A{background:#1e3a1e;color:#81c784}.btn-A:active{transform:scale(.95)}
.btn-B{background:#1a2e3a;color:#64b5f6}.btn-B:active{transform:scale(.95)}
.btn-C{background:#3a1e1e;color:#ef9a9a}.btn-C:active{transform:scale(.95)}
.btn-D{background:#1e2e1a;color:#a5d6a7}.btn-D:active{transform:scale(.95)}
.controls{display:flex;gap:6px;max-width:260px;margin:0 auto 6px}
.btn-back{flex:1;background:#1a1a1a;color:#888;border:1px solid #333;font-size:13px;height:34px;border-radius:8px;cursor:pointer}
.btn-clear{flex:1;background:transparent;color:#ef5350;border:1px solid #ef5350;font-size:12px;height:34px;border-radius:8px;cursor:pointer}
.legend{text-align:center;font-size:10px;color:#66bb6a;margin-bottom:8px}
.results-header{text-align:center;font-size:12px;font-weight:600;color:#a5d6a7;margin:6px 0 8px;padding:6px;background:#122115;border-radius:8px}
.game-card{background:#122115;border-radius:10px;border:1px solid #2e5030;padding:10px;margin-bottom:8px}
.game-title{font-size:11px;font-weight:600;color:#66bb6a;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.confidence{font-size:9px;padding:2px 6px;border-radius:8px;font-weight:500}
.conf-4{background:#1e3a1e;color:#a5d6a7}
.conf-3{background:#1e2e1a;color:#81c784}
.conf-2{background:#1a2a1a;color:#4caf50}
.conf-1{background:#1a1a1a;color:#666}
.section-title{font-size:10px;color:#4caf50;margin:8px 0 4px;text-transform:uppercase;letter-spacing:.5px}
.market-row{display:flex;align-items:center;gap:5px;margin-bottom:5px}
.market-name{font-size:10px;color:#888;width:95px;flex-shrink:0}
.bar-wrap{flex:1;height:5px;background:#1a2a1a;border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px}
.pct{font-size:11px;font-weight:700;width:30px;text-align:right;flex-shrink:0}
.delta{font-size:9px;width:30px;text-align:right;flex-shrink:0}
.edge-tag{font-size:9px;padding:1px 4px;border-radius:4px;font-weight:700;flex-shrink:0}
.edge-yes{background:#1e3a1e;color:#a5d6a7}
.edge-no{background:#3a1e1e;color:#ef9a9a}
.divider{border:none;border-top:1px solid #1e3a1e;margin:6px 0}
.no-data{text-align:center;padding:16px;color:#66bb6a;font-size:12px}
.set1-screen{display:none;text-align:center;padding:10px 0}
.set1-title{font-size:13px;font-weight:600;color:#a5d6a7;margin-bottom:6px}
.set1-sub{font-size:10px;color:#66bb6a;margin-bottom:14px}
.set1-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:260px;margin:0 auto}
.btn-set1{height:52px;border-radius:10px;border:1px solid #2e5030;font-size:18px;font-weight:700;cursor:pointer;background:#122115;color:#a5d6a7;transition:transform .1s}
.btn-set1:active{transform:scale(.95)}
.btn-set1.selected{background:#1e3a1e;border-color:#66bb6a;color:#fff}
.set1-info{font-size:10px;color:#4caf50;margin-top:10px;min-height:16px}
.server-badge{font-size:9px;padding:1px 5px;border-radius:4px;background:#1a2e3a;color:#64b5f6;margin-left:4px}
</style>
</head>
<body>
<div class="header">
  <h1>🎾 Tênis Predictor v3.15</h1>
  <p>4 pontos por game · 11 mercados · sacador identificado</p>
</div>

<div class="progress-wrap">
  <div class="progress-label" id="progress-label">Digite os 6 games do Set 1</div>
  <div class="progress" id="progress"></div>
</div>

<div class="step-label" id="step-label">Game 1 — Pontos 1 e 2</div>

<div class="pad">
  <button class="btn btn-D" onclick="addCode('D')">D<span class="sub">✅✅</span></button>
  <button class="btn btn-C" onclick="addCode('C')">C<span class="sub">❌❌</span></button>
  <button class="btn btn-A" onclick="addCode('A')">A<span class="sub">❌✅</span></button>
  <button class="btn btn-B" onclick="addCode('B')">B<span class="sub">✅❌</span></button>
</div>

<div class="controls">
  <button class="btn-back" onclick="backCode()">⌫ Apagar</button>
  <button class="btn-clear" onclick="clearCode()">Limpar</button>
</div>
<div class="legend">✅ sacador ganha ponto &nbsp; ❌ recebedor ganha</div>
<div id="set1-screen" class="set1-screen">
  <div class="set1-title">Quantos games teve o Set 1?</div>
  <div class="set1-sub">Isso define quem saca no Set 2</div>
  <div class="set1-grid">
    <button class="btn-set1" onclick="selectSet1Games(6)">6</button>
    <button class="btn-set1" onclick="selectSet1Games(7)">7</button>
    <button class="btn-set1" onclick="selectSet1Games(8)">8</button>
    <button class="btn-set1" onclick="selectSet1Games(9)">9</button>
    <button class="btn-set1" onclick="selectSet1Games(10)">10</button>
    <button class="btn-set1" onclick="selectSet1Games(11)">11</button>
    <button class="btn-set1" onclick="selectSet1Games(12)">12</button>
    <button class="btn-set1" onclick="selectSet1Games(13)">13</button>
  </div>
  <div class="set1-info" id="set1-info"></div>
</div>
<div id="results"></div>

// code: array of {c12, c34} per game, current step: {game, part (0=12, 1=34)}
let games=[], step={game:0, part:0}, set1Games=null;

function decompress(b){
  const bin=atob(b),bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
  return JSON.parse(new TextDecoder().decode(pako.inflate(bytes)));
}

function init(){
  try{LOOKUP=decompress(B64);}
  catch(e){document.getElementById("results").innerHTML="<div class='no-data'>Erro ao carregar</div>";return;}
  render();
}

function addCode(c){
  if(step.game>=6) return;
  if(step.part===0){
    games.push({c12:c,c34:null});
    step.part=1;
  } else {
    games[step.game].c34=c;
    step.game++;
    step.part=0;
  }
  render();
  if(step.game>=6){
    // Mostrar tela de seleção de games do Set 1
    document.getElementById("set1-screen").style.display="block";
    document.getElementById("results").innerHTML="";
    set1Games=null;
  } else {
    document.getElementById("set1-screen").style.display="none";
    document.getElementById("results").innerHTML="";
  }
}

function backCode(){
  if(step.part===1){
    games.pop();
    step.part=0;
  } else if(step.game>0){
    step.game--;
    games[step.game].c34=null;
    step.part=1;
  }
  set1Games=null;
  document.getElementById("set1-screen").style.display="none";
  render();
  document.getElementById("results").innerHTML="";
}

function clearCode(){
  games=[]; step={game:0,part:0}; set1Games=null;
  document.getElementById("set1-screen").style.display="none";
  render();
  document.getElementById("results").innerHTML="";
}

function render(){
  // Progress chips
  let html="";
  for(let i=0;i<6;i++){
    const g=games[i];
    const c12=g?g.c12:"";
    const c34=g&&g.c34?g.c34:"";
    const a12Active=i===step.game&&step.part===0&&step.game<6;
    const a34Active=i===step.game&&step.part===1;
    html+=`<div class="game-slot">
      <div class="chip ${c12?(c12+" "):""}${a12Active?"active empty":(!c12?"empty":"")}">${c12||(i+1)}</div>
      <div class="sep">·</div>
      <div class="chip ${c34?(c34+" "):""}${a34Active?"active empty":(!c34?"empty":"")}">${c34||"?"}</div>
    </div>`;
  }
  document.getElementById("progress").innerHTML=html;

  // Step label
  const lbl=document.getElementById("step-label");
  if(step.game>=6){lbl.textContent="Código completo — analisando...";}
  else if(step.part===0){lbl.textContent=`Game ${step.game+1} — Pontos 1 e 2`;}
  else{lbl.textContent=`Game ${step.game+1} — Pontos 3 e 4`;}
}

function col12(pct,type){
  if(type==="sac30") return pct>=45?"#a5d6a7":pct<=25?"#ef9a9a":"#c8e6c9";
  if(type==="rec30") return pct>=28?"#ef9a9a":pct<=12?"#a5d6a7":"#ccc";
  if(type==="p1515") return Math.abs(pct-47)>=7?"#64b5f6":"#ccc";
  if(type==="p3030") return pct>=25?"#ffcc80":pct<=10?"#a5d6a7":"#ccc";
  if(type==="p4040") return pct>=38?"#ef9a9a":pct<=15?"#a5d6a7":"#ccc";
  return "#ccc";
}

function col34(pct,type){
  if(type==="a40_0") return pct>=28?"#a5d6a7":pct<=12?"#ef9a9a":"#ccc";
  if(type==="a0_40") return pct>=16?"#ef9a9a":pct<=4?"#a5d6a7":"#ccc";
  if(type==="a30_15") return pct>=48?"#a5d6a7":pct<=33?"#ef9a9a":"#ccc";
  if(type==="a15_30") return pct>=40?"#ef9a9a":pct<=23?"#a5d6a7":"#ccc";
  if(type==="aV1") return pct>=20?"#a5d6a7":pct<=6?"#ef9a9a":"#ccc";
  if(type==="aV2") return pct>=8?"#ef9a9a":pct<=2?"#a5d6a7":"#ccc";
  return "#ccc";
}

function dc(d){return d>=8?"#a5d6a7":d<=-8?"#ef9a9a":"#555";}
function fd(d){return(d>0?"+":"")+d+"%";}

// Cross-group incompatibility map
const INCOMPAT = {
  // after-2 vs after-3: sac30=0, p1515=1, rec30=2
  // 30:0Sac(sac won pts1&2): pt3 can be S(40:0) or R(30:15) → 15:30 and 0:40 impossible
  // 15:15(sac won 1, rec won 2 or vice versa): pt3 could go any way
  //   BUT: 40:0 requires sac to win pts1+2+3 → impossible if 15:15 (rec won one of first 2)
  //   AND: 0:40 requires rec to win pts1+2+3 → impossible if 15:15 (sac won one of first 2)
  //   So 15:15 cancels both 40:0 AND 0:40
  // 30:0Rec(rec won 1&2): pt3 can be R(0:40) or S(15:30) → 40:0 and 30:15 impossible
  g2_g3: {0:[2,3], 1:[0,3], 2:[0,1]},
  // after-2 vs after-4: V1=0, 40:15=1, 30:30=2, 15:40=3, V2=4
  // 30:0Sac(sac won 1&2): V2(rec needs 4 wins impossible with sac 2) and 15:40(rec needs 3, max 2) impossible
  // 15:15: V1(sac needs 4, max 3 after 15:15) and V2(rec needs 4, max 3) impossible
  // 30:0Rec(rec won 1&2): V1(sac needs 4, max 2) and 40:15(sac needs 3, max 2) impossible
  g2_g4: {0:[3,4], 1:[0,4], 2:[0,1]},
  // after-3 vs after-4 (logically exact):
  // 40:0(sac3): only V1 or 40:15 possible → cancels 30:30,15:40,V2
  // 30:15(sac2rec1): only 40:15 or 30:30 possible → cancels V1,15:40,V2
  // 15:30(sac1rec2): only 30:30 or 15:40 possible → cancels V1,40:15,V2
  // 0:40(rec3): only 15:40 or V2 possible → cancels V1,40:15,30:30
  g3_g4: {0:[2,3,4], 1:[0,3,4], 2:[0,1,4], 3:[0,1,2]}
};

function pickBest(vals, bls, thr=8){
  // Returns ENTRAR for ALL markets above threshold, NÃO for those well below
  let bestIdx=-1, bestDelta=-999;
  const results = vals.map((v,i)=>{
    if(v<0) return {tag:"",delta:0};
    const d = v - bls[i];
    if(d>=thr && d>bestDelta){ bestDelta=d; bestIdx=i; }
    return {tag: d>=thr ? "ENTRAR" : "", delta:d};
  });
  // Set NÃO where significantly below threshold
  results.forEach((r,i)=>{ if(vals[i]>=0 && r.delta<=-thr) r.tag="NÃO"; });
  return {results, bestIdx};
}

function resolveAllConflicts(g2res, g3res, g4res, bestG2, bestG3){
  // Within Group 2: resolve mutual exclusions
  // 0=30:0Sac, 1=15:15, 2=30:0Rec, 3=15:15NÃO
  const g2inner={0:[1,2],1:[0,2,3],2:[0,1],3:[1]};
  for(let i=0;i<g2res.length;i++){
    if(g2res[i]&&g2res[i].tag==="ENTRAR"){
      (g2inner[i]||[]).forEach(j=>{
        if(g2res[j]&&g2res[j].tag==="ENTRAR"){
          if(g2res[i].delta>=g2res[j].delta) g2res[j].tag="";
          else g2res[i].tag="";
        }
      });
    }
  }

  // Within Group 3: resolve mutual exclusions
  // 0=40:0, 1=30:15, 2=15:30, 3=0:40
  // 40:0 e 15:30 são incompatíveis (sac ganhou 3 vs rec ganhou 2 de 3)
  // 40:0 e 0:40 são incompatíveis
  // 30:15 e 0:40 são incompatíveis
  // 30:15 e 15:30 são incompatíveis (sac2rec1 vs sac1rec2)
  const g3inner={0:[2,3], 1:[2,3], 2:[0,1], 3:[0,1]};
  for(let i=0;i<g3res.length;i++){
    if(g3res[i]&&g3res[i].tag==="ENTRAR"){
      (g3inner[i]||[]).forEach(j=>{
        if(g3res[j]&&g3res[j].tag==="ENTRAR"){
          if(g3res[i].delta>=g3res[j].delta) g3res[j].tag="";
          else g3res[i].tag="";
        }
      });
    }
  }

  // Within Group 4: resolve mutual exclusions
  // 0=V1, 1=40:15, 2=30:30, 3=15:40, 4=V2
  // V1(sac ganha 4 seguidos)  → incompatível com 30:30, 15:40, V2
  // 40:15(sac3rec1)           → incompatível com 15:40, V2
  // 30:30(sac2rec2)           → incompatível com V1, 40:15, 15:40, V2
  // 15:40(sac1rec3)           → incompatível com V1, 40:15, 30:30
  // V2(rec ganha 4 seguidos)  → incompatível com V1, 40:15, 30:30
  const g4inner={0:[2,3,4], 1:[3,4], 2:[0,1,3,4], 3:[0,1,2], 4:[0,1,2]};
  for(let i=0;i<g4res.length;i++){
    if(g4res[i]&&g4res[i].tag==="ENTRAR"){
      (g4inner[i]||[]).forEach(j=>{
        if(g4res[j]&&g4res[j].tag==="ENTRAR"){
          if(g4res[i].delta>=g4res[j].delta) g4res[j].tag="";
          else g4res[i].tag="";
        }
      });
    }
  }

  // Apply g2→g3 and g2→g4 cancellations
  g2res.forEach((r,i)=>{
    if(r&&r.tag==="ENTRAR"){
      if(INCOMPAT.g2_g3[i]) INCOMPAT.g2_g3[i].forEach(j=>{ if(g3res[j]) g3res[j].tag=g3res[j].tag==="ENTRAR"?"":g3res[j].tag; });
      if(INCOMPAT.g2_g4[i]) INCOMPAT.g2_g4[i].forEach(j=>{ if(g4res[j]) g4res[j].tag=g4res[j].tag==="ENTRAR"?"":g4res[j].tag; });
    }
  });
  // Apply g3→g4 cancellations
  g3res.forEach((r,i)=>{
    if(r&&r.tag==="ENTRAR"){
      if(INCOMPAT.g3_g4[i]) INCOMPAT.g3_g4[i].forEach(j=>{ if(g4res[j]) g4res[j].tag=g4res[j].tag==="ENTRAR"?"":g4res[j].tag; });
    }
  });
  return {g2res, g3res, g4res};
}

function propagateEntrar(g2res, g3res, g4res){
  // Propagation only applies if target market ALSO has meaningful edge (delta >= threshold)
  const thr = 8;
  
  // If 0:40 ENTRAR → 30:0 Recebedor gets ENTRAR only if its delta >= thr
  if(g3res[3]&&g3res[3].tag==="ENTRAR" && g2res[2]&&g2res[2].tag!=="ENTRAR" && g2res[2].delta>=thr)
    g2res[2].tag="ENTRAR";
  // If 40:0 ENTRAR → 30:0 Sacador gets ENTRAR only if its delta >= thr
  if(g3res[0]&&g3res[0].tag==="ENTRAR" && g2res[0]&&g2res[0].tag!=="ENTRAR" && g2res[0].delta>=thr)
    g2res[0].tag="ENTRAR";
  // If V2 ENTRAR → propagate up only where delta >= thr
  if(g4res[4]&&g4res[4].tag==="ENTRAR"){
    if(g3res[3]&&g3res[3].tag!=="ENTRAR"&&g3res[3].delta>=thr) g3res[3].tag="ENTRAR";
    if(g2res[2]&&g2res[2].tag!=="ENTRAR"&&g2res[2].delta>=thr) g2res[2].tag="ENTRAR";
  }
  // If V1 ENTRAR → propagate up only where delta >= thr
  if(g4res[0]&&g4res[0].tag==="ENTRAR"){
    if(g3res[0]&&g3res[0].tag!=="ENTRAR"&&g3res[0].delta>=thr) g3res[0].tag="ENTRAR";
    if(g2res[0]&&g2res[0].tag!=="ENTRAR"&&g2res[0].delta>=thr) g2res[0].tag="ENTRAR";
  }
  return {g2res, g3res, g4res};
}

function confLabel(tier){
  return [["conf-1","★☆☆☆"],["conf-1","★☆☆☆"],["conf-2","★★☆☆"],["conf-3","★★★☆"],["conf-4","★★★★"]][Math.min(tier,4)];
}

function row(name,pct,bl,type,colFn,thr=8){
  if(pct<0) return "";
  const d=pct-bl;
  const e=edgeMkt(pct,bl,thr);
  const etag=e?`<span class="edge-tag ${e==="ENTRAR"?"edge-yes":"edge-no"}">${e}</span>`:"";
  return `<div class="market-row">
    <span class="market-name">${name}</span>
    <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${colFn(pct,type)}"></div></div>
    <span class="pct" style="color:${colFn(pct,type)}">${pct}%</span>
    <span class="delta" style="color:${dc(d)}">${fd(d)}</span>
    ${etag}
  </div>`;
}

function selectSet1Games(n){
  set1Games=n;
  // Highlight botão selecionado
  document.querySelectorAll(".btn-set1").forEach(b=>{
    b.classList.toggle("selected", parseInt(b.textContent)===n);
  });
  const inverte = (n % 2 !== 0);
  const info = inverte
    ? `${n} games (ímpar) → sacador do Set 2 é INVERTIDO`
    : `${n} games (par) → sacador do Set 2 é o MESMO do Set 1`;
  document.getElementById("set1-info").textContent=info;
  // Esconder tela após breve pausa e mostrar resultados
  setTimeout(()=>{
    document.getElementById("set1-screen").style.display="none";
    renderPredictions();
  }, 600);
}

// Retorna true se deve inverter perspectiva sacador/recebedor no Set 2
function deveInverter(){
  return set1Games !== null && (set1Games % 2 !== 0);
}

// Inverte nome do mercado quando o sacador do game é diferente do sacador do Set 1
function nomeInvertido(nome, gameInverte){
  if(!gameInverte) return nome;
  const map = {
    "30:0 Sacador": "30:0 Recebedor",
    "30:0 Recebedor": "30:0 Sacador",
    "15:15 NÃO": "15:15 NÃO",
    "15:15": "15:15",
    "40:0": "0:40",
    "30:15": "15:30",
    "15:30": "30:15",
    "0:40": "40:0",
    "V1 40+:0": "V2 0:40+",
    "40:15": "15:40",
    "30:30": "30:30",
    "15:40": "40:15",
    "V2 0:40+": "V1 40+:0",
    "40:40": "40:40",
  };
  return map[nome] !== undefined ? map[nome] : nome;
}


function renderPredictions(){
  if(!LOOKUP) return;
  const inv = deveInverter();
  const key12=games.map(g=>g.c12).join("");
  const key34=games.map(g=>g.c34||"D").join("");
  const d12=LOOKUP.u12[key12];
  const d34=LOOKUP.u34[key34];
  const el=document.getElementById("results");

  if(!d12&&!d34){el.innerHTML="<div class='no-data'>Padrão sem dados suficientes.</div>";return;}

  const sacInfo = set1Games !== null
    ? (inv ? `<span class="server-badge">⚠️ Sacador invertido (${set1Games} games)</span>` : `<span class="server-badge">✅ Mesmo sacador (${set1Games} games)</span>`)
    : "";
  let html=`<div class="results-header">SET 2 — Previsões por Game ${sacInfo}</div>`;

  for(let gi=0;gi<6;gi++){
    const v12=d12?d12[gi]:null;
    const v34=d34?d34[gi]:null;
    if(!v12&&!v34) continue;

    const tier=v12?v12[5]:(v34?v34[9]:0);
    const [cClass,cLabel]=confLabel(tier);

    let cardHTML="";

    // --- GROUP 2 ---
    let g2Tags=[], bestG2=-1;
    if(v12){
      const [pS,pR,p15]=v12;
      const pNo=pS+pR;
      const g2vals=[pS,p15,pR,pNo];
      const g2bls=[BL12.sac30[gi],BL12.p1515[gi],BL12.rec30[gi],BL12.sac30[gi]+BL12.rec30[gi]];
      const {results,bestIdx}=pickBest(g2vals,g2bls);
      g2Tags=results; bestG2=bestIdx;
    }

    // --- GROUP 3 ---
    let g3Tags=[], bestG3=-1;
    if(v34){
      const [a40_0,a30_15,a15_30,a0_40]=v34;
      if(a40_0>=0){
        const g3vals=[a40_0,a30_15,a15_30,a0_40];
        const g3bls=[BL34.a40_0[gi],BL34.a30_15[gi],BL34.a15_30[gi],BL34.a0_40[gi]];
        const {results,bestIdx}=pickBest(g3vals,g3bls,9);
        g3Tags=results; bestG3=bestIdx;
      }
    }

    // --- GROUP 4 ---
    let g4Tags=[], g5Tags=[];
    if(v34){
      const [,,,, aV1,a40_15,a30_30,a15_40,aV2]=v34;
      if(aV1>=0){
        const g4vals=[aV1,a40_15,a30_30,a15_40,aV2];
        const g4bls=[BL34.aV1[gi],BL34.a40_15[gi],BL34.a30_30[gi],BL34.a15_40[gi],BL34.aV2[gi]];
        const {results}=pickBest(g4vals,g4bls,10);
        g4Tags=results;
      }
    }

    // Group 5: 30:30 and 40:40 from v12 lookup
    if(v12){
      const [,,,p30,p40]=v12;
      if(p30>=0||p40>=0){
        const g5vals=[p30>=0?p30:-1, p40>=0?p40:-1];
        const g5bls=[BL12.p3030[gi], BL12.p4040[gi]];
        const {results:g5r}=pickBest(g5vals,g5bls,9);
        g5Tags=g5r;
      }
    }
    
    // Resolve cross-group conflicts
    resolveAllConflicts(g2Tags,g3Tags,g4Tags,bestG2,bestG3);

    // --- Resolução completa do g5 (30:30 e 40:40 do u12) ---
    if(g5Tags.length){
      // 1) Cancela g5[0] (30:30) se g3 indica extremo (40:0 ou 0:40) — caminhos incompatíveis
      if(g3Tags[0]&&g3Tags[0].tag==="ENTRAR" && g5Tags[0]) g5Tags[0].tag="";
      if(g3Tags[3]&&g3Tags[3].tag==="ENTRAR" && g5Tags[0]) g5Tags[0].tag="";

      // 2) Cancela g5[0] (30:30) se g4 tem ENTRAR em V1, 40:15, 15:40 ou V2 — incompatíveis com 30:30
      //    30:30 só é possível se o game passou por empate 2-2, impossível se V1/V2/40:15/15:40
      if(g4Tags[0]&&g4Tags[0].tag==="ENTRAR" && g5Tags[0]) g5Tags[0].tag=""; // V1
      if(g4Tags[1]&&g4Tags[1].tag==="ENTRAR" && g5Tags[0]) g5Tags[0].tag=""; // 40:15
      if(g4Tags[3]&&g4Tags[3].tag==="ENTRAR" && g5Tags[0]) g5Tags[0].tag=""; // 15:40
      if(g4Tags[4]&&g4Tags[4].tag==="ENTRAR" && g5Tags[0]) g5Tags[0].tag=""; // V2

      // 3) Se v34 tem dados de 30:30, SEMPRE cancela g5[0] para não duplicar
      //    (independente de g4Tags ter sido populado ou não)
      const v34has3030 = v34 && v34[6] >= 0;
      if(g5Tags[0] && v34has3030){
        g5Tags[0].tag="";
      }

      // 4) Cancela g5[1] (40:40) se g4 tem ENTRAR em V1, V2, 40:15 ou 15:40 — incompatíveis
      if(g5Tags[1]){
        if(g4Tags[0]&&g4Tags[0].tag==="ENTRAR") g5Tags[1].tag=""; // V1
        if(g4Tags[1]&&g4Tags[1].tag==="ENTRAR") g5Tags[1].tag=""; // 40:15
        if(g4Tags[3]&&g4Tags[3].tag==="ENTRAR") g5Tags[1].tag=""; // 15:40
        if(g4Tags[4]&&g4Tags[4].tag==="ENTRAR") g5Tags[1].tag=""; // V2
      }
    }

    // Propagate: if deeper market has ENTRAR, earlier markets on same path also get ENTRAR
    propagateEntrar(g2Tags,g3Tags,g4Tags);

    // Badge de sacador por game
    // Se Set1 par (inv=false): G1(gi=0)=mesmo, G2(gi=1)=invertido, G3=mesmo...
    // Se Set1 ímpar (inv=true): G1(gi=0)=invertido, G2(gi=1)=mesmo, G3=invertido...
    const sacadorInvertido = inv ? (gi % 2 === 0) : (gi % 2 !== 0);
    const sacBadge = set1Games !== null
      ? `<span class="server-badge">${sacadorInvertido ? "🔄 Sac. invertido" : "▶ Mesmo sacador"}</span>`
      : "";

    // --- RENDER ---
    const mkTag=(t)=>t.tag?`<span class="edge-tag ${t.tag==="ENTRAR"?"edge-yes":"edge-no"}">${t.tag}</span>`:"";
    const mkRow=(name,pct,bl,type,colFn,tagObj)=>{
      if(pct<0) return "";
      const d=pct-bl;
      const displayName = nomeInvertido(name, sacadorInvertido);
      return `<div class="market-row"><span class="market-name">${displayName}</span><div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${colFn(pct,type)}"></div></div><span class="pct" style="color:${colFn(pct,type)}">${pct}%</span><span class="delta" style="color:${dc(d)}">${fd(d)}</span>${mkTag(tagObj||{tag:""})}</div>`;
    };

    if(v12){
      const [pS,pR,p15,p30,p40]=v12;
      const pNo=pS+pR;
      cardHTML+=`<div class="section-title">Após 2 Pontos</div>`;
      cardHTML+=mkRow("30:0 Sacador",pS,BL12.sac30[gi],"sac30",col12,g2Tags[0]);
      cardHTML+=mkRow("15:15",p15,BL12.p1515[gi],"p1515",col12,g2Tags[1]);
      cardHTML+=mkRow("30:0 Recebedor",pR,BL12.rec30[gi],"rec30",col12,g2Tags[2]);
      cardHTML+=mkRow("15:15 NÃO",pNo,BL12.sac30[gi]+BL12.rec30[gi],"sac30",()=>"#aaa",g2Tags[3]);
    }

    if(v34 && (g3Tags.length||g4Tags.length||g5Tags.length)){
      const [a40_0,a30_15,a15_30,a0_40,aV1,a40_15,a30_30,a15_40,aV2]=v34;
      if(cardHTML) cardHTML+=`<hr class="divider">`;
      if(g3Tags.length){
        cardHTML+=`<div class="section-title">Após 3 Pontos</div>`;
        cardHTML+=mkRow("40:0",a40_0,BL34.a40_0[gi],"a40_0",col34,g3Tags[0]);
        cardHTML+=mkRow("30:15",a30_15,BL34.a30_15[gi],"a30_15",col34,g3Tags[1]);
        cardHTML+=mkRow("15:30",a15_30,BL34.a15_30[gi],"a15_30",col34,g3Tags[2]);
        cardHTML+=mkRow("0:40",a0_40,BL34.a0_40[gi],"a0_40",col34,g3Tags[3]);
      }
      if(g4Tags.length){
        cardHTML+=`<div class="section-title">Após 4 Pontos</div>`;
        cardHTML+=mkRow("V1 40+:0",aV1,BL34.aV1[gi],"aV1",col34,g4Tags[0]);
        cardHTML+=mkRow("40:15",a40_15,BL34.a40_15[gi],"a40_15",col34,g4Tags[1]);
        cardHTML+=mkRow("30:30",a30_30,BL34.a30_30[gi],"a30_30",col34,g4Tags[2]);
        cardHTML+=mkRow("15:40",a15_40,BL34.a15_40[gi],"a15_40",col34,g4Tags[3]);
        cardHTML+=mkRow("V2 0:40+",aV2,BL34.aV2[gi],"aV2",col34,g4Tags[4]);
      }
      if(g5Tags.length){
        if(!g4Tags.length) cardHTML+=`<div class="section-title">Após 4 Pontos</div>`;
        // Só mostra 30:30 do u12 se v34 NÃO tem dados de 30:30 (evita duplicata)
        const v34has3030 = v34 && v34[6]>=0;
        if(v12[3]>=0 && !v34has3030) cardHTML+=mkRow("30:30",v12[3],BL12.p3030[gi],"p3030",col12,g5Tags[0]);
        if(v12[4]>=0) cardHTML+=mkRow("40:40",v12[4],BL12.p4040[gi],"p4040",col12,g5Tags[1]||{tag:""});
      }
    }

    html+=`<div class="game-card">
      <div class="game-title"><span>Game ${gi+1} ${sacBadge}</span><span class="confidence ${cClass}">${cLabel}</span></div>
      ${cardHTML}
    </div>`;
  }
  el.innerHTML=html;
}

window.onload=function(){
  if(typeof pako!=="undefined") init();
  else setTimeout(()=>{if(typeof pako!=="undefined")init();},1000);
  render();
};
</script>
</body>
</html>
